<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENITH — The Celestial Eye</title>
<meta name="description" content="Real-time cosmic radar — track celestial objects, the ISS, planets, and stars from any location on Earth.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — Obsidian & Starlight
   ═══════════════════════════════════════════════════ */
:root {
  --bg: #000000;
  --text: #ffffff;
  --accent: #a8c4d4;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.06);
  --glass-blur: blur(24px);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-ui: 'Inter', -apple-system, sans-serif;
  --font-mono: 'DM Mono', 'Consolas', monospace;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  cursor: default;
  user-select: none;
}

/* ═══════════════════════════════════════════════════
   CANVAS — the interface IS the canvas
   ═══════════════════════════════════════════════════ */
#mainCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
  transition: opacity 200ms ease;
}

/* ═══════════════════════════════════════════════════
   BOOT SEQUENCE
   ═══════════════════════════════════════════════════ */
#bootOverlay {
  position: fixed; inset: 0;
  z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 800ms var(--ease);
}
#bootOverlay.fade-out { opacity: 0; pointer-events: none; }
#bootOverlay .boot-logo {
  font-family: var(--font-display);
  font-weight: 300; font-size: 28px;
  letter-spacing: 0.3em;
  color: var(--text);
  opacity: 0;
  animation: bootFadeIn 1200ms 200ms var(--ease) forwards;
}
#bootOverlay .boot-sub {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-top: 12px;
  opacity: 0;
  animation: bootFadeIn 1000ms 800ms var(--ease) forwards;
}
@keyframes bootFadeIn { to { opacity: 1; } }

/* ═══════════════════════════════════════════════════
   TOPBAR — wordmark + clock + object count
   ═══════════════════════════════════════════════════ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 400ms var(--ease);
}
#topbar.visible { opacity: 1; }
#topbar > * { pointer-events: auto; }

.wordmark {
  font-family: var(--font-display);
  font-weight: 300; font-size: 14px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text);
}

.topbar-right {
  display: flex; align-items: center; gap: 24px;
}

.obj-count {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}

.utc-clock {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════════
   VIEW MODE PILLS — bottom center
   ═══════════════════════════════════════════════════ */
#viewModes {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; gap: 2px;
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  padding: 3px;
  opacity: 0;
  transition: opacity 400ms var(--ease);
}
#viewModes.visible { opacity: 1; }

.view-btn {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  background: transparent;
  border: none; outline: none;
  padding: 8px 20px;
  border-radius: 100px;
  cursor: pointer;
  transition: all 300ms var(--ease);
}
.view-btn:hover { color: rgba(255,255,255,0.7); }
.view-btn.active {
  color: var(--text);
  background: rgba(255,255,255,0.08);
}

/* ═══════════════════════════════════════════════════
   LEFT PANEL — object list (slides in)
   ═══════════════════════════════════════════════════ */
#leftPanel {
  position: fixed; top: 70px; left: 0; bottom: 80px;
  z-index: 90;
  width: 220px;
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-right: 1px solid var(--glass-border);
  border-top-right-radius: 16px;
  border-bottom-right-radius: 16px;
  transform: translateX(-100%);
  transition: transform 400ms var(--ease), opacity 400ms var(--ease);
  opacity: 0;
  overflow: hidden;
  display: flex; flex-direction: column;
}
#leftPanel.visible { transform: translateX(0); opacity: 1; }

.panel-header {
  padding: 16px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.panel-close {
  background: none; border: none; outline: none;
  color: rgba(255,255,255,0.3); cursor: pointer;
  font-size: 14px; padding: 4px;
  transition: color 300ms ease;
}
.panel-close:hover { color: rgba(255,255,255,0.7); }

/* Filter toggles */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 4px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.filter-tag {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 200ms ease;
}
.filter-tag.active {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  border-color: rgba(255,255,255,0.12);
}
.filter-tag:hover { color: rgba(255,255,255,0.6); }

.obj-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}
.obj-list::-webkit-scrollbar { width: 3px; }
.obj-list::-webkit-scrollbar-track { background: transparent; }
.obj-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

.obj-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 200ms ease, opacity 200ms ease;
  opacity: 0;
}
.obj-item.show { opacity: 1; }
.obj-item:hover { background: rgba(255,255,255,0.03); }
.obj-item.selected { background: rgba(255,255,255,0.05); }

.obj-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  transition: transform 300ms var(--ease);
}
.obj-item.selected .obj-dot { transform: scale(1.6); }
.obj-item .obj-info { flex: 1; min-width: 0; }
.obj-name {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 10px;
  color: rgba(255,255,255,0.8);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.obj-meta {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 9px;
  color: rgba(255,255,255,0.25);
  margin-top: 1px;
}
.obj-vis {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 7px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 100px;
}
.obj-vis.above { color: rgba(168,196,212,0.8); background: rgba(168,196,212,0.08); }
.obj-vis.below { color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }

/* ═══════════════════════════════════════════════════
   RIGHT PANEL — detail card (floats in)
   ═══════════════════════════════════════════════════ */
#rightPanel {
  position: fixed; top: 50%; right: 28px;
  z-index: 90;
  transform: translateY(-50%) translateX(20px);
  width: 260px;
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: all 400ms var(--ease);
}
#rightPanel.visible {
  opacity: 1; pointer-events: auto;
  transform: translateY(-50%) translateX(0);
}

.detail-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; outline: none;
  color: rgba(255,255,255,0.25); cursor: pointer;
  font-size: 13px; padding: 4px;
  transition: color 300ms ease;
}
.detail-close:hover { color: rgba(255,255,255,0.6); }

.detail-type {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.6;
  margin-bottom: 6px;
}
.detail-name {
  font-family: var(--font-display);
  font-weight: 300; font-size: 22px;
  color: var(--text);
  margin-bottom: 4px;
}
.detail-desc {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 10px;
  line-height: 1.6;
  color: rgba(255,255,255,0.35);
  margin-bottom: 20px;
}
.detail-big-num {
  font-family: var(--font-display);
  font-weight: 300; font-size: 48px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 2px;
}
.detail-big-label {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 20px;
}
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.detail-stat-label {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 3px;
}
.detail-stat-value {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 12px;
  color: rgba(255,255,255,0.7);
}

/* ISS Ground Track mini-map */
.iss-map {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.iss-map svg {
  width: 100%; height: auto;
  opacity: 0.5;
}
.iss-map-label {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  margin-bottom: 6px;
}

/* Moon phase in detail */
.moon-phase-vis {
  width: 40px; height: 40px;
  margin: 8px 0 12px;
}

/* Pass predictions */
.pass-list { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.04); }
.pass-title {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 8px;
}
.pass-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.pass-time {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 9px;
  color: rgba(255,255,255,0.5);
}
.pass-info {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 9px;
  color: rgba(255,255,255,0.3);
}

/* ═══════════════════════════════════════════════════
   LOCATION SEARCH — floating bar
   ═══════════════════════════════════════════════════ */
#locationBar {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; align-items: center; gap: 8px;
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  padding: 6px 6px 6px 18px;
  opacity: 0;
  transition: opacity 400ms var(--ease);
  width: auto; max-width: 380px;
}
#locationBar.visible { opacity: 1; }

#locationBar .loc-label {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
  flex-shrink: 0;
}
#locationInput {
  background: none; border: none; outline: none;
  font-family: var(--font-ui);
  font-weight: 300; font-size: 12px;
  color: var(--text);
  width: 160px;
  padding: 4px 0;
}
#locationInput::placeholder { color: rgba(255,255,255,0.15); }

.loc-btn {
  background: rgba(255,255,255,0.06);
  border: none; outline: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-family: var(--font-ui);
  font-weight: 300; font-size: 9px;
  padding: 6px 12px;
  border-radius: 100px;
  white-space: nowrap;
  transition: all 200ms ease;
}
.loc-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

/* Toggle left panel button */
#toggleList {
  position: fixed; top: 50%; left: 12px;
  z-index: 95;
  transform: translateY(-50%);
  background: var(--glass);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  width: 28px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.25);
  font-size: 10px;
  transition: all 300ms var(--ease);
  opacity: 0;
}
#toggleList.visible { opacity: 1; }
#toggleList:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }
#toggleList.open { left: 226px; }

/* ═══════════════════════════════════════════════════
   SOLAR SYSTEM STATUS — bottom left
   ═══════════════════════════════════════════════════ */
#solarStatus {
  position: fixed; bottom: 28px; left: 28px;
  z-index: 90;
  display: flex; gap: 16px;
  opacity: 0;
  transition: opacity 400ms var(--ease);
}
#solarStatus.visible { opacity: 1; }

.solar-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.solar-icon {
  width: 6px; height: 6px; border-radius: 50%;
}
.solar-name {
  font-family: var(--font-ui);
  font-weight: 300; font-size: 7px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
}
.solar-alt {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 9px;
  color: rgba(255,255,255,0.4);
}

/* ═══════════════════════════════════════════════════
   ISS FLOATING TELEMETRY — top right area
   ═══════════════════════════════════════════════════ */
#issTelemetry {
  position: fixed; top: 60px; right: 28px;
  z-index: 85;
  text-align: right;
  opacity: 0;
  transition: opacity 400ms var(--ease);
  pointer-events: none;
}
#issTelemetry.visible { opacity: 1; }

.iss-label {
  font-family: var(--font-ui);
  font-weight: 500; font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.5;
  margin-bottom: 4px;
}
.iss-val {
  font-family: var(--font-mono);
  font-weight: 300; font-size: 11px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════ */
@media (max-width: 1100px) {
  #rightPanel { display: none; }
  #leftPanel { width: 180px; }
  #toggleList.open { left: 186px; }
}
@media (max-width: 640px) {
  #leftPanel { width: 100%; border-radius: 0; top: auto; bottom: 0; height: 45vh;
    border-right: none; border-top: 1px solid var(--glass-border);
    transform: translateY(100%); }
  #leftPanel.visible { transform: translateY(0); }
  #toggleList { display: none; }
  #solarStatus { display: none; }
  #issTelemetry { display: none; }
  #locationBar { max-width: 90vw; }
  #viewModes { bottom: 12px; }
  .topbar-right .obj-count { display: none; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     BOOT OVERLAY
     ═══════════════════════════════════════════════════ -->
<div id="bootOverlay">
  <div class="boot-logo">ZENITH</div>
  <div class="boot-sub">The Celestial Eye</div>
</div>

<!-- ═══════════════════════════════════════════════════
     MAIN CANVAS
     ═══════════════════════════════════════════════════ -->
<canvas id="mainCanvas"></canvas>

<!-- ═══════════════════════════════════════════════════
     TOPBAR
     ═══════════════════════════════════════════════════ -->
<div id="topbar">
  <div class="wordmark">ZENITH</div>
  <div class="topbar-right">
    <div class="obj-count" id="objCount"></div>
    <div class="utc-clock" id="utcClock"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     LOCATION BAR
     ═══════════════════════════════════════════════════ -->
<div id="locationBar">
  <span class="loc-label">Location</span>
  <input type="text" id="locationInput" placeholder="Search city…" autocomplete="off">
  <button class="loc-btn" id="gpsBtn" title="Use GPS">GPS</button>
</div>

<!-- ═══════════════════════════════════════════════════
     VIEW MODE PILLS
     ═══════════════════════════════════════════════════ -->
<div id="viewModes">
  <button class="view-btn active" data-view="globe">Globe</button>
  <button class="view-btn" data-view="skymap">Sky Map</button>
  <button class="view-btn" data-view="radar">Radar</button>
</div>

<!-- ═══════════════════════════════════════════════════
     TOGGLE LIST BUTTON
     ═══════════════════════════════════════════════════ -->
<div id="toggleList">☰</div>

<!-- ═══════════════════════════════════════════════════
     LEFT PANEL — Object List
     ═══════════════════════════════════════════════════ -->
<div id="leftPanel">
  <div class="panel-header">
    <span class="panel-title">Objects</span>
    <button class="panel-close" id="closeList">✕</button>
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="obj-list" id="objList"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     RIGHT PANEL — Detail Card
     ═══════════════════════════════════════════════════ -->
<div id="rightPanel">
  <button class="detail-close" id="closeDetail">✕</button>
  <div id="detailContent"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     SOLAR SYSTEM STATUS — bottom left
     ═══════════════════════════════════════════════════ -->
<div id="solarStatus"></div>

<!-- ═══════════════════════════════════════════════════
     ISS TELEMETRY — floating top right
     ═══════════════════════════════════════════════════ -->
<div id="issTelemetry">
  <div class="iss-label">ISS Telemetry</div>
  <div class="iss-val" id="issSpeed">—</div>
  <div class="iss-val" id="issAlt">—</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   ZENITH — The Celestial Eye
   A real-time cosmic radar by design.
   
   Note: GPS requires localhost or HTTPS.
   ISS API (api.wheretheiss.at) requires internet; falls back to simulation.
   ═══════════════════════════════════════════════════════════════════════ */

// ─── CONSTANTS & CONFIGURATION ────────────────────────────────────────
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;
const TWO_PI = Math.PI * 2;
const EARTH_R = 6371; // km

// Default location: Chennai, India
let observer = { lat: 12.9249, lon: 80.1000, alt: 0, name: 'Chennai' };

// ─── STAR CATALOG (FK5 J2000) ─────────────────────────────────────────
const STARS = [
  { name: 'Sirius',     ra: 101.287, dec: -16.716, mag: -1.46 },
  { name: 'Canopus',    ra: 95.988,  dec: -52.696, mag: -0.74 },
  { name: 'Arcturus',   ra: 213.915, dec: 19.182,  mag: -0.05 },
  { name: 'Vega',       ra: 279.235, dec: 38.784,  mag: 0.03  },
  { name: 'Capella',    ra: 79.172,  dec: 45.998,  mag: 0.08  },

function initStarField() {
  starField = [];
  for (let i = 0; i < 300; i++) {
    starField.push({
      x: Math.random(),
      y: Math.random(),
      size: 0.3 + Math.random() * 1.2,
      speed: 0.3 + Math.random() * 0.7,
      phase: Math.random() * TWO_PI,
      warm: Math.random() > 0.5,
      layer: Math.floor(Math.random() * 3),
    });
  }
}
initStarField();

function drawStarField(t) {
  const w = window.innerWidth, h = window.innerHeight;
  for (const s of starField) {
    const parallax = [0, 0.0001, 0.0003][s.layer];
    const ox = s.x * w + Math.sin(t * 0.0001) * parallax * w;
    const oy = s.y * h + Math.cos(t * 0.00008) * parallax * h;
    const px = ((ox % w) + w) % w;
    const py = ((oy % h) + h) % h;
    const flicker = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * 0.002 * s.speed + s.phase));
    ctx.globalAlpha = flicker * 0.6;
    ctx.fillStyle = s.warm ? '#ffe8c0' : '#c0d8ff';
    ctx.beginPath();
    ctx.arc(px, py, s.size, 0, TWO_PI);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════════════
// ASTRONOMY ENGINE — Jean Meeus Astronomical Algorithms
// ═══════════════════════════════════════════════════════════════════════

function getJD(date) {
  return date.getTime() / 86400000 + 2440587.5;
}

function getGMST(jd) {
  const T = (jd - 2451545) / 36525;
  let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545) + 0.000387933 * T * T;
  return ((gmst % 360) + 360) % 360;
}

function getLST(jd, lon) {
  return ((getGMST(jd) + lon) % 360 + 360) % 360;
}

function eqToHz(ra, dec, lat, lon, jd) {
  const lst = getLST(jd, lon);
  let H = (lst - ra + 360) % 360;
  if (H > 180) H -= 360;
  const Hrad = H * DEG, dRad = dec * DEG, lRad = lat * DEG;
  const sinAlt = Math.sin(dRad) * Math.sin(lRad) + Math.cos(dRad) * Math.cos(lRad) * Math.cos(Hrad);
  const alt = Math.asin(sinAlt) * RAD;
  const cosAz = (Math.sin(dRad) - sinAlt * Math.sin(lRad)) / (Math.cos(Math.asin(sinAlt)) * Math.cos(lRad));
  let az = Math.acos(Math.max(-1, Math.min(1, cosAz))) * RAD;
  if (Math.sin(Hrad) > 0) az = 360 - az;
  return { alt, az };
}

// Solar position — Astronomical Almanac low-precision
function getSunPosition(jd) {
  const n = jd - 2451545;
  let L = (280.460 + 0.9856474 * n) % 360;
  if (L < 0) L += 360;
  const g = (357.528 + 0.9856003 * n) * DEG;
  const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * DEG;
  const epsilon = (23.439 - 0.0000004 * n) * DEG;
  const ra = Math.atan2(Math.cos(epsilon) * Math.sin(lambda), Math.cos(lambda)) * RAD;
  const dec = Math.asin(Math.sin(epsilon) * Math.sin(lambda)) * RAD;
  return { ra: (ra + 360) % 360, dec, name: 'Sun', type: 'sun', mag: -26.74, desc: 'Our star — center of the Solar System' };
}

// Lunar position — ELP2000 truncated
function getMoonPosition(jd) {
  const T = (jd - 2451545) / 36525;
  const Lp = (218.3164 + 481267.8812 * T) % 360;
  const Mm = (134.9634 + 477198.8676 * T) * DEG;
  const D  = (297.8502 + 445267.1115 * T) * DEG;
  const F  = (93.2721 + 483202.0175 * T) * DEG;
  let lam = Lp + 6.289 * Math.sin(Mm) + 1.274 * Math.sin(2 * D - Mm) + 0.658 * Math.sin(2 * D);
  const beta = -5.128 * Math.sin(F);
  const lamRad = lam * DEG, betRad = beta * DEG;
  const eps = 23.439 * DEG;
  const ra = Math.atan2(Math.sin(lamRad) * Math.cos(eps) - Math.tan(betRad) * Math.sin(eps), Math.cos(lamRad)) * RAD;
  const dec = Math.asin(Math.sin(betRad) * Math.cos(eps) + Math.cos(betRad) * Math.sin(eps) * Math.sin(lamRad)) * RAD;
  // Moon phase
  const sunPos = getSunPosition(jd);
  let elong = lam - (sunPos.ra);
  elong = ((elong % 360) + 360) % 360;
  const age = elong / 12.1907; // days approx
  const illum = (1 - Math.cos(elong * DEG)) / 2 * 100;
  let phaseName = 'New Moon';
  if (elong > 10 && elong <= 80) phaseName = 'Waxing Crescent';
  else if (elong > 80 && elong <= 100) phaseName = 'First Quarter';
  else if (elong > 100 && elong <= 170) phaseName = 'Waxing Gibbous';
  else if (elong > 170 && elong <= 190) phaseName = 'Full Moon';
  else if (elong > 190 && elong <= 260) phaseName = 'Waning Gibbous';
  else if (elong > 260 && elong <= 280) phaseName = 'Last Quarter';
  else if (elong > 280 && elong <= 350) phaseName = 'Waning Crescent';
  return { ra: (ra + 360) % 360, dec, name: 'Moon', type: 'moon', mag: -12.6,
    desc: `${phaseName} · ${illum.toFixed(0)}% illuminated`, phaseName, illum, phaseAngle: elong };
}

// Planet positions — mean orbital elements
function getPlanetPosition(planet, jd) {
  const n = jd - 2451545;
  const M = (planet.M0 + planet.Md * n) % 360;
  const ra = ((M + 360) % 360);
  const dec = planet.inc * Math.sin(M * DEG);
  return { ra, dec, name: planet.name, type: 'planet', mag: 1.0, desc: planet.desc };
}

// Satellite simulation
function getSatPosition(sat, t) {
  const period = sat.period;
  const frac = ((t / 1000 + sat.phase * 1000) % period) / period;
  const angle = frac * TWO_PI;
  const lat = sat.inc * Math.sin(angle);
  const lon = ((frac * 360 + t * 0.001) % 360) - 180;
  return { lat, lon, alt: sat.alt, name: sat.name, type: 'satellite', desc: sat.desc };
}

// ISS azimuth/elevation from observer
function issAzEl(issLat, issLon, issAlt) {
  const dLat = (issLat - observer.lat) * DEG;
  const dLon = (issLon - observer.lon) * DEG;
  const dx = EARTH_R * dLon * Math.cos(observer.lat * DEG);
  const dy = EARTH_R * dLat;
  const dz = issAlt - observer.alt;
  const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
  const el = Math.atan2(dz, Math.sqrt(dx * dx + dy * dy)) * RAD;
  let az = Math.atan2(dx, dy) * RAD;
  az = ((az % 360) + 360) % 360;
  return { az, alt: el, dist };
}

// Satellite azimuth/elevation from observer
function satAzEl(satLat, satLon, satAlt) {
  return issAzEl(satLat, satLon, satAlt);
}

// Compute all objects
function computeObjects(now) {
  const jd = getJD(now);
  const t = now.getTime();
  const objects = [];

  // Sun
  if (filters.Sun) {
    const sun = getSunPosition(jd);
    const hz = eqToHz(sun.ra, sun.dec, observer.lat, observer.lon, jd);
    objects.push({ ...sun, ...hz, distance: '149.6M km' });
  }

  // Moon
  if (filters.Moon) {
    const moon = getMoonPosition(jd);
    const hz = eqToHz(moon.ra, moon.dec, observer.lat, observer.lon, jd);
    objects.push({ ...moon, ...hz, distance: '384,400 km' });
  }

  // Planets
  if (filters.Planets) {
    for (const p of PLANETS) {
      const pos = getPlanetPosition(p, jd);
      const hz = eqToHz(pos.ra, pos.dec, observer.lat, observer.lon, jd);
      objects.push({ ...pos, ...hz, distance: '—' });
    }
  }

  // Stars
  if (filters.Stars) {
    for (const s of STARS) {
      const hz = eqToHz(s.ra, s.dec, observer.lat, observer.lon, jd);
      objects.push({ ...s, ...hz, type: 'star', desc: `Magnitude ${s.mag.toFixed(2)}`, distance: '—' });
    }
  }

  // ISS
  if (filters.ISS && issData) {
    const hz = issAzEl(issData.latitude, issData.longitude, issData.altitude);
    objects.push({
      name: 'ISS', type: 'iss', mag: -3.5,
      desc: 'International Space Station',
      ...hz,
      lat: issData.latitude, lon: issData.longitude,
      issAlt: issData.altitude,
      speed: issData.velocity,
      distance: hz.dist.toFixed(0) + ' km',
    });
  }

  // Satellites
  if (filters.Satellites) {
    for (const sat of SATELLITES) {
      const pos = getSatPosition(sat, t);
      const hz = satAzEl(pos.lat, pos.lon, pos.alt);
      objects.push({
        name: sat.name, type: 'satellite', mag: 3.0,
        desc: sat.desc, ...hz,
        lat: pos.lat, lon: pos.lon,
        satAlt: pos.alt,
        distance: hz.dist.toFixed(0) + ' km',
      });
    }
  }

  allObjects = objects;
  return objects;
}

// ISS FETCH
// ═══════════════════════════════════════════════════════════════════════
let issTrack = [];
let issLastFetch = 0;

async function fetchISS() {
  try {
    const res = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    issData = { latitude: data.latitude, longitude: data.longitude, altitude: data.altitude, velocity: data.velocity / 3600 };
    issFallback = false;
    issTrack.push({ lat: data.latitude, lon: data.longitude, t: Date.now() });
    if (issTrack.length > 120) issTrack.shift();
  } catch (e) {
    issFallback = true;
    const t = Date.now() / 1000;
    const lat = 51.6 * Math.sin(t / 5580 * TWO_PI);
    const lon = ((t * 360 / 5580) % 360) - 180;
    issData = { latitude: lat, longitude: lon, altitude: 420, velocity: 7.66 };
    issTrack.push({ lat, lon, t: Date.now() });
    if (issTrack.length > 120) issTrack.shift();
  }
}

// ISS pass predictions (simplified)
function predictISSPasses() {
  const passes = [];
  const now = Date.now();
  for (let i = 1; i <= 5; i++) {
    const passTime = new Date(now + i * 5580 * 1000 + Math.random() * 3600000);
    const dur = 2 + Math.floor(Math.random() * 6);
    const maxEl = 10 + Math.floor(Math.random() * 70);
    passes.push({
      time: passTime.toISOString().substr(11, 5) + ' UTC',
      date: passTime.toISOString().substr(5, 5),
      duration: dur + 'min',
      maxEl: maxEl + '°',
    });
  }
  return passes;
}

function latLonToGlobe(lat, lon, cx, cy, r, rotX, rotY) {
  const phi = lat * DEG, lam = (lon - rotY) * DEG;
  const cosLat = Math.cos(phi);
  let x = cosLat * Math.sin(lam);
  let y = -Math.sin(phi);
  let z = cosLat * Math.cos(lam);
  // Rotate around X axis (tilt)
  const tilt = rotX * DEG;
  const y2 = y * Math.cos(tilt) - z * Math.sin(tilt);
  const z2 = y * Math.sin(tilt) + z * Math.cos(tilt);
  if (z2 < -0.05) return null; // behind globe
  return { x: cx + x * r, y: cy + y2 * r, z: z2 };
}

function drawGlobe(now, t) {
  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.32;
  const jd = getJD(now);

  // Idle rotation
  if (!isDragging) {
    globeRotY += 0.008; // ~0.1 deg/s at 60fps
  }

  // ── Atmospheric glow ──
  const atmGrad = ctx.createRadialGradient(cx, cy, r, cx, cy, r * 1.15);
  atmGrad.addColorStop(0, 'rgba(40,120,255,0.12)');
  atmGrad.addColorStop(0.4, 'rgba(40,120,255,0.04)');
  atmGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = atmGrad;
  ctx.beginPath(); ctx.arc(cx, cy, r * 1.15, 0, TWO_PI); ctx.fill();

  // ── Ocean sphere ──
  const oceanGrad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.15, 0, cx, cy, r);
  oceanGrad.addColorStop(0, '#1a3a5c');
  oceanGrad.addColorStop(0.6, '#0e2240');
  oceanGrad.addColorStop(1, '#050d1a');
  ctx.fillStyle = oceanGrad;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TWO_PI); ctx.fill();

  // ── Grid lines ──
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  // Latitude lines
  for (let lat = -60; lat <= 60; lat += 30) {
    ctx.beginPath();
    let started = false;
    for (let lon = -180; lon <= 180; lon += 3) {
      const p = latLonToGlobe(lat, lon, cx, cy, r, globeRotX, globeRotY);
      if (p) { if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y); }
      else started = false;
    }
    ctx.stroke();
  }
  // Longitude lines
  for (let lon = -180; lon < 180; lon += 30) {
    ctx.beginPath();
    let started = false;
    for (let lat = -90; lat <= 90; lat += 3) {
      const p = latLonToGlobe(lat, lon, cx, cy, r, globeRotX, globeRotY);
      if (p) { if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y); }
      else started = false;
    }
    ctx.stroke();
  }

  // ── Continents ──
  // Clip everything to the globe circle to prevent edge overflow
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r - 0.5, 0, TWO_PI);
  ctx.clip();

  for (const [name, coords] of Object.entries(CONTINENTS)) {
    // Project all points, collecting visible segments
    const projected = coords.map(([lon, lat]) => {
      const p = latLonToGlobe(lat, lon, cx, cy, r, globeRotX, globeRotY);
      return p; // null if behind
    });

    // Draw filled polygon using only visible points, connecting segments
    const landGrad = ctx.createRadialGradient(cx - r * 0.15, cy - r * 0.15, r * 0.1, cx, cy, r);
    landGrad.addColorStop(0, '#1a4525');
    landGrad.addColorStop(0.5, '#163d20');
    landGrad.addColorStop(1, '#0f2e15');
    ctx.fillStyle = landGrad;
    ctx.strokeStyle = 'rgba(50,120,60,0.15)';
    ctx.lineWidth = 0.5;

    // Collect segments of visible points
    let segments = [];
    let current = [];
    for (let i = 0; i < projected.length; i++) {
      const p = projected[i];
      if (p && p.z > -0.1) {
        current.push(p);
      } else {
        if (current.length > 0) { segments.push(current); current = []; }
      }
    }
    if (current.length > 0) segments.push(current);

    // If first and last segments should connect (polygon wraps around)
    if (segments.length > 1 && projected[0] && projected[0].z > -0.1 &&
        projected[projected.length - 1] && projected[projected.length - 1].z > -0.1) {
      segments[0] = segments[segments.length - 1].concat(segments[0]);
      segments.pop();
    }

    for (const seg of segments) {
      if (seg.length < 3) continue;
      ctx.beginPath();
      ctx.moveTo(seg[0].x, seg[0].y);
      for (let i = 1; i < seg.length; i++) {
        ctx.lineTo(seg[i].x, seg[i].y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  }
  ctx.restore();

  // ── Specular highlight ──
  const specGrad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx - r * 0.3, cy - r * 0.3, r * 0.6);
  specGrad.addColorStop(0, 'rgba(255,255,255,0.08)');
  specGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = specGrad;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TWO_PI); ctx.fill();

  // ── Edge darkening ──
  const edgeGrad = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, r);
  edgeGrad.addColorStop(0, 'transparent');
  edgeGrad.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = edgeGrad;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TWO_PI); ctx.fill();

  // ── Observer location marker ──
  const obsP = latLonToGlobe(observer.lat, observer.lon, cx, cy, r, globeRotX, globeRotY);
  if (obsP && obsP.z > 0) {
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(obsP.x, obsP.y, 3, 0, TWO_PI); ctx.fill();
    ctx.font = '300 9px "DM Mono", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText(`${observer.lat.toFixed(1)}°, ${observer.lon.toFixed(1)}°`, obsP.x, obsP.y + 16);
  }

  // ── ISS on globe ──
  if (issData && filters.ISS) {
    // ISS orbit trail
    if (filters.Orbits) {
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      let started = false;
      for (const pt of issTrack) {
        const p = latLonToGlobe(pt.lat, pt.lon, cx, cy, r, globeRotX, globeRotY);
        if (p && p.z > 0) {
          if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
        } else started = false;
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    const issP = latLonToGlobe(issData.latitude, issData.longitude, cx, cy, r * 1.06, globeRotX, globeRotY);
    if (issP && issP.z > -0.2) {
      const issSel = selectedObj && selectedObj.name === 'ISS';
      const sc = issSel ? 1.3 : 1;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(issP.x, issP.y, 3 * sc, 0, TWO_PI); ctx.fill();
      ctx.font = '300 9px "DM Mono", monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.textAlign = 'center';
      ctx.fillText('ISS', issP.x, issP.y - 10);
    }
  }

  // ── Satellites on globe ──
  if (filters.Satellites) {
    for (const sat of SATELLITES) {
      const pos = getSatPosition(sat, now.getTime());
      const p = latLonToGlobe(pos.lat, pos.lon, cx, cy, r * 1.04, globeRotX, globeRotY);
      if (p && p.z > 0) {
        const isSel = selectedObj && selectedObj.name === sat.name;
        ctx.fillStyle = isSel ? '#ffffff' : 'rgba(168,196,212,0.5)';
        ctx.beginPath(); ctx.arc(p.x, p.y, isSel ? 3 : 2, 0, TWO_PI); ctx.fill();
      }
    }
  }

  // ── Celestial objects projected on sky dome ──
  for (const obj of allObjects) {
    if (obj.type === 'iss' || obj.type === 'satellite') continue;
    if (obj.alt <= 0) continue;
    // Project on a dome above the globe
    const skyR = r * 1.3;
    const azRad = obj.az * DEG;
    const altRad = obj.alt * DEG;
    const projR = skyR * Math.cos(altRad);
    const sx = cx + projR * Math.sin(azRad);
    const sy = cy - projR * Math.cos(azRad) * 0.5 - skyR * Math.sin(altRad) * 0.3;

    const isSel = selectedObj && selectedObj.name === obj.name;
    let dotR = 2;
    if (obj.type === 'sun') { dotR = 5; ctx.fillStyle = '#fff8e0'; }
    else if (obj.type === 'moon') { dotR = 4; ctx.fillStyle = '#e0e8f0'; }
    else if (obj.type === 'planet') { dotR = 3; ctx.fillStyle = 'rgba(168,196,212,0.7)'; }
    else { dotR = Math.max(1.5, 4 - obj.mag); ctx.fillStyle = 'rgba(255,255,255,0.6)'; }

    if (isSel) dotR *= 1.3;
    ctx.beginPath(); ctx.arc(sx, sy, dotR, 0, TWO_PI); ctx.fill();
  }
}

function drawSkyMap(now, t) {
  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.38;

  // Sky circle background
  ctx.fillStyle = '#000000';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TWO_PI); ctx.fill();

  // Altitude rings
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for (const altDeg of [30, 60]) {
    const ringR = r * (1 - altDeg / 90);
    ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, TWO_PI); ctx.stroke();
  }

  // Horizon circle
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, TWO_PI); ctx.stroke();

  // Cardinals
  ctx.font = '300 10px "Inter", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('N', cx, cy - r - 14);
  ctx.fillText('S', cx, cy + r + 14);
  ctx.fillText('E', cx + r + 14, cy);
  ctx.fillText('W', cx - r - 14, cy);

  // Helper: project az/alt to sky map coords
  function skyProj(az, alt) {
    if (alt < 0) return null;
    const dist = r * (1 - alt / 90);
    const azRad = az * DEG;
    return { x: cx + dist * Math.sin(azRad), y: cy - dist * Math.cos(azRad) };
  }

  // Constellation lines with draw animation
  if (filters.Constellations) {
    constellationDrawProgress = Math.min(1, constellationDrawProgress + 0.008);
    for (const con of CONSTELLATIONS) {
      const points = [];
      for (const sName of con.stars) {
        const obj = allObjects.find(o => o.name === sName);
        if (obj && obj.alt > 0) {
          const p = skyProj(obj.az, obj.alt);
          if (p) points.push(p);
        }
      }
      if (points.length >= 2) {
        ctx.strokeStyle = con.color;
        ctx.lineWidth = 1;
        // Compute total length for dash animation
        let totalLen = 0;
        for (let i = 1; i < points.length; i++) {
          totalLen += Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
        }
        const drawLen = totalLen * constellationDrawProgress;
        ctx.setLineDash([drawLen, totalLen]);
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        if (points.length > 2) ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  // Draw objects
  for (const obj of allObjects) {
    if (obj.alt < 0) continue;
    const p = skyProj(obj.az, obj.alt);
    if (!p) continue;

    const isSel = selectedObj && selectedObj.name === obj.name;
    let dotR = 3;

    if (obj.type === 'sun') {
      dotR = 7;
      const sunGlow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 12);
      sunGlow.addColorStop(0, 'rgba(255,248,220,0.8)');
      sunGlow.addColorStop(0.5, 'rgba(255,220,100,0.2)');
      sunGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = sunGlow;
      ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, TWO_PI); ctx.fill();
      ctx.fillStyle = '#fff8e0';
    } else if (obj.type === 'moon') {
      dotR = 6;
      ctx.fillStyle = '#e0e8f0';
      ctx.beginPath(); ctx.arc(p.x, p.y, dotR, 0, TWO_PI); ctx.fill();
      // Phase shading
      if (obj.phaseAngle !== undefined) {
        const pa = obj.phaseAngle;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath();
        if (pa < 180) {
          ctx.arc(p.x, p.y, dotR, -Math.PI/2, Math.PI/2, false);
          const k = Math.cos(pa * DEG);
          ctx.ellipse(p.x, p.y, dotR * Math.abs(k), dotR, 0, Math.PI/2, -Math.PI/2, k > 0);
        } else {
          ctx.arc(p.x, p.y, dotR, Math.PI/2, -Math.PI/2, false);
          const k = Math.cos(pa * DEG);
          ctx.ellipse(p.x, p.y, dotR * Math.abs(k), dotR, 0, -Math.PI/2, Math.PI/2, k < 0);
        }
        ctx.fill();
      }
      continue; // already drawn
    } else if (obj.type === 'iss') {
      dotR = 4; ctx.fillStyle = '#ffffff';
    } else if (obj.type === 'satellite') {
      dotR = 2.5; ctx.fillStyle = 'rgba(168,196,212,0.6)';
    } else if (obj.type === 'planet') {
      dotR = 4; ctx.fillStyle = 'rgba(168,196,212,0.8)';
    } else {
      // Star — size by magnitude
      dotR = Math.max(1.5, 4 - obj.mag * 0.8);
      ctx.fillStyle = `rgba(255,255,255,${Math.min(0.9, 0.4 + (2 - obj.mag) * 0.15)})`;
    }

    if (isSel) {
      dotR *= 1.2;
      ctx.fillStyle = '#ffffff';
    }
    ctx.beginPath(); ctx.arc(p.x, p.y, dotR, 0, TWO_PI); ctx.fill();

    // Label (only above 15° altitude)
    if (obj.alt > 15) {
      ctx.font = '300 9px "DM Mono", monospace';
      ctx.fillStyle = isSel ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.35)';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(obj.name, p.x + dotR + 6, p.y);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// RADAR RENDERER
// ═══════════════════════════════════════════════════════════════════════

function drawRadar(now, t) {
  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.38;

  radarAngle = (radarAngle + 0.012) % TWO_PI; // sweep speed

  // Rings
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (const frac of [0.25, 0.5, 0.75, 1.0]) {
    ctx.beginPath(); ctx.arc(cx, cy, r * frac, 0, TWO_PI); ctx.stroke();
  }

  // Cross hairs
  ctx.beginPath();
  ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy);
  ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
  ctx.stroke();

  // Sweep trail — last 90° shows fading green
  const sweepSpan = Math.PI / 2;
  for (let i = 0; i < 60; i++) {
    const frac = i / 60;
    const angle = radarAngle - sweepSpan * frac;
    const alpha = 0.06 * (1 - frac);
    ctx.strokeStyle = `rgba(0,255,100,${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.stroke();
  }

  // Leading edge
  ctx.strokeStyle = 'rgba(0,255,100,0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + r * Math.cos(radarAngle), cy + r * Math.sin(radarAngle));
  ctx.stroke();

  // Objects as dots
  function radarProj(az, alt) {
    if (alt < -10) return null;
    const dist = r * Math.max(0, 1 - Math.max(0, alt) / 90);
    const azRad = az * DEG;
    return { x: cx + dist * Math.sin(azRad), y: cy - dist * Math.cos(azRad) };
  }

  for (const obj of allObjects) {
    const p = radarProj(obj.az, obj.alt);
    if (!p) continue;

    let dotR = 3;
    let color = 'rgba(0,255,100,0.5)';
    if (obj.type === 'sun') { dotR = 5; color = 'rgba(255,220,100,0.6)'; }
    else if (obj.type === 'moon') { dotR = 4; color = 'rgba(200,210,230,0.6)'; }
    else if (obj.type === 'iss') { dotR = 4; color = 'rgba(0,255,100,0.8)'; }
    else if (obj.type === 'satellite') { dotR = 2.5; color = 'rgba(0,255,100,0.4)'; }
    else if (obj.type === 'planet') { dotR = 3.5; color = 'rgba(100,255,150,0.6)'; }
    else { dotR = 2; color = 'rgba(0,255,100,0.3)'; }

    const isSel = selectedObj && selectedObj.name === obj.name;
    if (isSel) { dotR *= 1.3; color = 'rgba(0,255,100,0.9)'; }

    // Glow
    if (obj.alt > 0) {
      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, dotR * 3);
      glow.addColorStop(0, color);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(p.x, p.y, dotR * 3, 0, TWO_PI); ctx.fill();
    }

    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(p.x, p.y, dotR, 0, TWO_PI); ctx.fill();
  }
}

function updateClock() {

function updateObjCount() {

  document.getElementById('objCount').textContent =
    `${total} objects · ${visible} visible`;
}

function updateISSTelemetry() {

    document.getElementById('issSpeed').textContent =
      `${(issData.velocity || 7.66).toFixed(2)} km/s`;

function updateSolarStatus() {
  const container = document.getElementById('solarStatus');
  const items = ['Sun', 'Moon', 'Mercury', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
  const colors = {
    Sun: '#fff8e0', Moon: '#c8d0e0', Mercury: '#b0b0b0', Venus: '#ffe8c0',
    Mars: '#ffb0a0', Jupiter: '#ffd8a0', Saturn: '#ffe0b0'
  };
  let html = '';
  for (const name of items) {
    const obj = allObjects.find(o => o.name === name);

    const c = colors[name] || '#a8c4d4';
    html += `<div class="solar-item">
      <div class="solar-icon" style="background:${c}"></div>
      <div class="solar-name">${name}</div>

function updateObjectList() {
  const list = document.getElementById('objList');
  const sorted = [...allObjects].sort((a, b) => b.alt - a.alt);
  let html = '';
  for (let i = 0; i < sorted.length; i++) {
    const o = sorted[i];
    const vis = o.alt > 0;
    const sel = selectedObj && selectedObj.name === o.name;
    const delay = i * 30;
    html += `<div class="obj-item ${sel ? 'selected' : ''}" data-name="${o.name}" 
      style="transition-delay:${delay}ms">
      <div class="obj-dot" style="background:${
        o.type === 'sun' ? '#fff8e0' : o.type === 'moon' ? '#c8d0e0' :

          <div><div class="detail-stat-label">Speed</div><div class="detail-stat-value">${(obj.speed || 7.66).toFixed(2)} km/s</div></div>
          <div><div class="detail-stat-label">Orbit Alt</div><div class="detail-stat-value">${(obj.issAlt || 420).toFixed(0)} km</div></div>
          <div><div class="detail-stat-label">Latitude</div><div class="detail-stat-value">${(obj.lat || 0).toFixed(2)}°</div></div>
          <div><div class="detail-stat-label">Longitude</div><div class="detail-stat-value">${(obj.lon || 0).toFixed(2)}°</div></div>
        </div>
      </div>`;

    // ISS Ground Track mini SVG map
    html += `
      <div class="iss-map">
        <div class="iss-map-label">Ground Track</div>
        <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
          <rect width="360" height="180" fill="rgba(255,255,255,0.03)" rx="4"/>
          <line x1="0" y1="90" x2="360" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <line x1="180" y1="0" x2="180" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <polyline points="${issTrack.map(p => `${p.lon + 180},${90 - p.lat}`).join(' ')}" 
            fill="none" stroke="rgba(168,196,212,0.4)" stroke-width="1"/>
          <circle cx="${(obj.lon || 0) + 180}" cy="${90 - (obj.lat || 0)}" r="3" fill="#fff"/>
          <circle cx="${observer.lon + 180}" cy="${90 - observer.lat}" r="2" fill="rgba(168,196,212,0.6)"/>
        </svg>
      </div>`;

    // Pass predictions
    const passes = predictISSPasses();
    html += `
      <div class="pass-list">
        <div class="pass-title">Upcoming Passes</div>
        ${passes.map(p => `
          <div class="pass-item">
            <span class="pass-time">${p.date} ${p.time}</span>
            <span class="pass-info">${p.duration} · ${p.maxEl}</span>
          </div>`).join('')}
      </div>`;
  }

  content.innerHTML = html;
  panel.classList.add('visible');

  // Draw moon phase canvas
  if (obj.type === 'moon') {
    setTimeout(() => {
      const mc = document.getElementById('moonPhaseCanvas');
      if (!mc) return;
      const mctx = mc.getContext('2d');
      const mr = 18;
      // Full lit circle
      mctx.fillStyle = '#e0e8f0';
      mctx.beginPath(); mctx.arc(mr, mr, mr - 1, 0, TWO_PI); mctx.fill();
      // Shadow
      mctx.fillStyle = '#111';
      mctx.beginPath();
      const pa = obj.phaseAngle || 0;
      if (pa < 180) {
        mctx.arc(mr, mr, mr - 1, -Math.PI/2, Math.PI/2, false);
        const k = Math.cos(pa * DEG);
        mctx.ellipse(mr, mr, (mr - 1) * Math.abs(k), mr - 1, 0, Math.PI/2, -Math.PI/2, k > 0);
      } else {
        mctx.arc(mr, mr, mr - 1, Math.PI/2, -Math.PI/2, false);
        const k = Math.cos(pa * DEG);
        mctx.ellipse(mr, mr, (mr - 1) * Math.abs(k), mr - 1, 0, -Math.PI/2, Math.PI/2, k < 0);
      }
      mctx.fill();
    }, 50);
  }
}

function initFilters() {

  let html = '';
  for (const key of Object.keys(filters)) {

// ─── LOCATION PIPELINE ───────────────────────────────────────────────

async function searchLocation(query) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`,
      { headers: { 'User-Agent': 'ZENITH/1.0' } }
    );
    const data = await res.json();
    if (data.length > 0) {
      observer.lat = parseFloat(data[0].lat);
      observer.lon = parseFloat(data[0].lon);
      observer.name = data[0].display_name.split(',')[0];
      // Rotate globe to new location
      globeRotY = -observer.lon;
      globeRotX = -observer.lat * 0.3;
      constellationDrawProgress = 0;
      return true;
    }
  } catch (e) { console.warn('Location search failed:', e); }
  return false;
}

function useGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      observer.lat = pos.coords.latitude;
      observer.lon = pos.coords.longitude;
      observer.name = 'GPS Location';
      globeRotY = -observer.lon;
      globeRotX = -observer.lat * 0.3;
      constellationDrawProgress = 0;
      document.getElementById('locationInput').value = '';
      document.getElementById('locationInput').placeholder = `${observer.lat.toFixed(2)}°, ${observer.lon.toFixed(2)}°`;
    },
    (err) => console.warn('GPS error:', err),
    { enableHighAccuracy: true }
  );
}

// ─── GLOBE CLICK → lat/lon ────────────────────────────────────────────
function globeClickToLatLon(mx, my) {
  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.32;
  const dx = mx - cx, dy = my - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > r) return null;
  // Reverse projection
  const x = dx / r, y = dy / r;
  const z = Math.sqrt(Math.max(0, 1 - x * x - y * y));
  // Undo rotation
  const tilt = globeRotX * DEG;
  const y2 = -y * Math.cos(tilt) + z * Math.sin(tilt); // swap sign
  const z2 = y * Math.sin(tilt) + z * Math.cos(tilt); // not exactly right but close enough
  const lat = Math.asin(-(-y * Math.cos(tilt) + z * Math.sin(tilt))) * RAD;
  const lon = (Math.atan2(x, z2) * RAD + globeRotY + 360) % 360;
  return { lat, lon: lon > 180 ? lon - 360 : lon };
}

// ─── CANVAS CLICK — select object or globe click ──────────────────────
function handleCanvasClick(mx, my) {
  // Check objects first
  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;

  if (currentView === 'globe') {
    const r = Math.min(w, h) * 0.32;
    // Check ISS
    if (issData && filters.ISS) {
      const issP = latLonToGlobe(issData.latitude, issData.longitude, cx, cy, r * 1.06, globeRotX, globeRotY);
      if (issP && Math.hypot(mx - issP.x, my - issP.y) < 15) {
        const obj = allObjects.find(o => o.name === 'ISS');
        if (obj) { showDetailPanel(obj); updateObjectList(); return; }
      }
    }
    // Globe click for location
    const ll = globeClickToLatLon(mx, my);
    if (ll) {
      observer.lat = ll.lat;
      observer.lon = ll.lon;
      observer.name = `${ll.lat.toFixed(2)}°, ${ll.lon.toFixed(2)}°`;
      constellationDrawProgress = 0;
      document.getElementById('locationInput').value = '';
      document.getElementById('locationInput').placeholder = observer.name;
    }
  }

  if (currentView === 'skymap' || currentView === 'radar') {
    const r = Math.min(w, h) * 0.38;
    // Find nearest object
    let nearest = null, nearDist = 20;
    for (const obj of allObjects) {
      if (obj.alt < 0) continue;
      const dist = r * (1 - obj.alt / 90);
      const azRad = obj.az * DEG;
      const px = cx + dist * Math.sin(azRad);
      const py = cy - dist * Math.cos(azRad);
      const d = Math.hypot(mx - px, my - py);
      if (d < nearDist) { nearDist = d; nearest = obj; }
    }
    if (nearest) { showDetailPanel(nearest); updateObjectList(); }
  }
}

// Location search
document.getElementById('locationInput').addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {

    if (!val) return;
    // Check for manual lat/lon
    const parts = val.split(',').map(s => parseFloat(s.trim()));

      observer.lat = parts[0];
      observer.lon = parts[1];
      observer.name = `${parts[0].toFixed(2)}°, ${parts[1].toFixed(2)}°`;
      globeRotY = -observer.lon;
      globeRotX = -observer.lat * 0.3;

      await searchLocation(val);

    e.target.placeholder = observer.name;

});

// GPS button
document.getElementById('gpsBtn').addEventListener('click', useGPS);

// Canvas drag (globe rotation)
canvas.addEventListener('mousedown', (e) => {
  if (currentView !== 'globe') return;
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragStartRotX = globeRotX; dragStartRotY = globeRotY;
  canvas.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  globeRotY = dragStartRotY - dx * 0.3;
  globeRotX = Math.max(-60, Math.min(60, dragStartRotX + dy * 0.3));
});

window.addEventListener('mouseup', (e) => {
  if (isDragging) {
    const dx = Math.abs(e.clientX - dragStartX);
    const dy = Math.abs(e.clientY - dragStartY);
    if (dx < 3 && dy < 3) {
      handleCanvasClick(e.clientX, e.clientY);
    }
    isDragging = false;
    canvas.style.cursor = 'default';
  }
});

// Click for sky map / radar
canvas.addEventListener('click', (e) => {
  if (currentView !== 'globe') {
    handleCanvasClick(e.clientX, e.clientY);
  }
});

// Touch support
let touchStartX = 0, touchStartY = 0, touchStartRotX = 0, touchStartRotY = 0;
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  touchStartX = t.clientX; touchStartY = t.clientY;
  touchStartRotX = globeRotX; touchStartRotY = globeRotY;
  isDragging = true;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (!isDragging || currentView !== 'globe') return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  globeRotY = touchStartRotY - dx * 0.3;
  globeRotX = Math.max(-60, Math.min(60, touchStartRotX + dy * 0.3));
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  isDragging = false;
});

// ═══════════════════════════════════════════════════════════════════════
// MAIN RENDER LOOP
// ═══════════════════════════════════════════════════════════════════════

function render(timestamp) {
  animFrame = requestAnimationFrame(render);
  if (!bootDone) return;

  const now = new Date();
  const t = timestamp || 0;
  const w = window.innerWidth, h = window.innerHeight;

  // Clear
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, w, h);

  // Star field always draws
  drawStarField(t);

  // Compute objects
  computeObjects(now);

  // Render active view
  if (currentView === 'globe') drawGlobe(now, t);
  else if (currentView === 'skymap') drawSkyMap(now, t);
  else if (currentView === 'radar') drawRadar(now, t);

  // Update UI elements periodically (throttled)
  if (Math.floor(t / 1000) !== Math.floor((t - 16) / 1000)) {
    updateClock();
    updateObjCount();
    updateISSTelemetry();
    updateSolarStatus();
    if (selectedObj) {
      const updated = allObjects.find(o => o.name === selectedObj.name);
      if (updated) showDetailPanel(updated);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════════════════════════════════

async function boot() {
  // Set initial globe rotation to show Chennai
  globeRotY = -observer.lon;
  globeRotX = -observer.lat * 0.3;

  // Fetch ISS immediately
  await fetchISS();

  // Initialize filters
  initFilters();

  // Start render loop
  bootDone = true;
  requestAnimationFrame(render);

  // Wait for visual boot animation
  await new Promise(r => setTimeout(r, 2200));

  // Fade out boot overlay
  document.getElementById('bootOverlay').classList.add('fade-out');

  // Stagger in UI elements
  await new Promise(r => setTimeout(r, 400));
  document.getElementById('topbar').classList.add('visible');

  await new Promise(r => setTimeout(r, 200));
  document.getElementById('locationBar').classList.add('visible');

  await new Promise(r => setTimeout(r, 200));
  document.getElementById('viewModes').classList.add('visible');
  document.getElementById('toggleList').classList.add('visible');

  await new Promise(r => setTimeout(r, 200));
  document.getElementById('solarStatus').classList.add('visible');
  document.getElementById('issTelemetry').classList.add('visible');

  // Remove boot overlay from DOM after transition
  await new Promise(r => setTimeout(r, 800));
  document.getElementById('bootOverlay').remove();

  // Update location placeholder
  document.getElementById('locationInput').placeholder = observer.name;
}

boot();
</script>
</body>
</html>
